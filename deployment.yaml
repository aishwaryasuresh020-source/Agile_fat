apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: payment

  template:
    metadata:
      labels:
        app: payment

    spec:
      containers:
      - name: payment-container
        image: yourdockerhubusername/payment-app:latest
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service

spec:
  type: NodePort

  selector:
    app: payment

  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30099
